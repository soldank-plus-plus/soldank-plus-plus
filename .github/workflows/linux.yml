name: Linux Debug Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
  VCPKG_DOWNLOADS: ${{ github.workspace }}/.vcpkg-downloads
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 1G
  CC: clang
  CXX: clang++

jobs:
  linux-debug:
    runs-on: ubuntu-26.04

    steps:
      - uses: actions/checkout@v4

      - name: Create cache directories
        run: mkdir -p .vcpkg-bincache .vcpkg-downloads .cpm-cache .ccache

      - name: Install vcpkg
        id: vcpkg
        run: |
          vcpkg_commit="$(jq -r '."builtin-baseline"' vcpkg.json)"
          git clone https://github.com/microsoft/vcpkg
          git -C vcpkg checkout "$vcpkg_commit"
          ./vcpkg/bootstrap-vcpkg.sh
          echo "commit=$vcpkg_commit" >> "$GITHUB_OUTPUT"

      - name: Restore vcpkg downloads cache
        id: vcpkg-downloads-cache
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-

      - name: Restore compiler cache
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-clang-debug-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-clang-debug-
            ccache-${{ runner.os }}-clang-

      - name: Restore CPM source cache
        id: cpm-cache
        uses: actions/cache/restore@v4
        with:
          path: .cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get -y install cmake clang ninja-build ccache mold xorg-dev libglu1-mesa-dev
          clang --version
          clang++ --version

      - name: Compute vcpkg toolchain fingerprint
        id: vcpkg-toolchain
        run: |
          compiler_hash="$(sha256sum "$(command -v clang++)" | cut -d ' ' -f 1)"
          toolchain_versions="$(dpkg-query -W -f='${Package}=${Version}\n' clang libc6-dev libstdc++-15-dev)"
          fingerprint="$(printf '%s\n%s\n' "$compiler_hash" "$toolchain_versions" | sha256sum | cut -d ' ' -f 1)"
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Restore vcpkg binary cache
        id: vcpkg-binary-cache
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-bincache
          key: vcpkg-bincache-${{ runner.os }}-v2-${{ steps.vcpkg.outputs.commit }}-${{ steps.vcpkg-toolchain.outputs.fingerprint }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}-${{ github.sha }}
          restore-keys: |
            vcpkg-bincache-${{ runner.os }}-v2-${{ steps.vcpkg.outputs.commit }}-${{ steps.vcpkg-toolchain.outputs.fingerprint }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}-

      - name: Configure
        run: cmake --preset clang-ninja-debug-all

      - name: Save vcpkg downloads cache
        if: steps.vcpkg-downloads-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .vcpkg-downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Save vcpkg binary cache
        if: steps.vcpkg-binary-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .vcpkg-bincache
          key: vcpkg-bincache-${{ runner.os }}-v2-${{ steps.vcpkg.outputs.commit }}-${{ steps.vcpkg-toolchain.outputs.fingerprint }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}-${{ github.sha }}

      - name: Save CPM source cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}

      - name: Build
        run: cmake --build --preset clang-ninja-debug-all --parallel

      - name: Show compiler cache stats
        if: always()
        run: ccache --show-stats

      - name: Save compiler cache
        if: always() && steps.ccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-clang-debug-${{ github.sha }}

      - name: Run tests
        run: ctest --test-dir build/clang-ninja-debug-all --output-on-failure
