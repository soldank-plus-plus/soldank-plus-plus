# Simple workflow for deploying static content to GitHub Pages
name: Deploy test coverage report to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
  VCPKG_DOWNLOADS: ${{ github.workspace }}/.vcpkg-downloads
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 1G

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create cache directories
        run: mkdir -p .vcpkg-bincache .vcpkg-downloads .cpm-cache .ccache

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Restore vcpkg downloads cache
        id: vcpkg-downloads-cache
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-

      - name: Restore vcpkg binary cache
        id: vcpkg-binary-cache
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-bincache
          key: vcpkg-bincache-${{ runner.os }}-ubuntu26-clang-v1-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-bincache-${{ runner.os }}-ubuntu26-clang-v1-

      - name: Restore compiler cache
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-clang-coverage-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-clang-coverage-
            ccache-${{ runner.os }}-clang-

      - name: Restore CPM source cache
        id: cpm-cache
        uses: actions/cache/restore@v4
        with:
          path: .cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get -y install cmake clang llvm ninja-build ccache mold xorg-dev libglu1-mesa-dev lcov
          clang --version
          clang++ --version
          llvm-cov --version

      - name: Configure
        run: cmake --preset clang-ninja-coverage-all

      - name: Save vcpkg downloads cache
        if: steps.vcpkg-downloads-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .vcpkg-downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Save vcpkg binary cache
        if: steps.vcpkg-binary-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .vcpkg-bincache
          key: vcpkg-bincache-${{ runner.os }}-ubuntu26-clang-v1-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Save CPM source cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}

      - name: Build
        run: cmake --build --preset clang-ninja-coverage-all --parallel

      - name: Show compiler cache stats
        if: always()
        run: ccache --show-stats

      - name: Save compiler cache
        if: always() && steps.ccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-clang-coverage-${{ github.sha }}

      - name: Run tests and generate coverage
        run: |
          cat > /tmp/llvm-gcov.sh <<'EOF'
          #!/usr/bin/env bash
          exec llvm-cov gcov "$@"
          EOF
          chmod +x /tmp/llvm-gcov.sh
          ctest --preset clang-ninja-coverage-all
          lcov --gcov-tool /tmp/llvm-gcov.sh --directory build/clang-ninja-coverage-all --capture --output-file build/clang-ninja-coverage-all/coverage.info --keep-going --ignore-errors gcov,inconsistent,format
          lcov --extract build/clang-ninja-coverage-all/coverage.info '*/source/*' --output-file build/clang-ninja-coverage-all/coverage-src.info --ignore-errors gcov,inconsistent
          genhtml -o build/clang-ninja-coverage-all/coverage build/clang-ninja-coverage-all/coverage-src.info --ignore-errors inconsistent,unsupported,category

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: './build/clang-ninja-coverage-all/coverage'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
