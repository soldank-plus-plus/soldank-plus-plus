name: Make Release

on:
  push:
    branches:
      - main

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
  VCPKG_DOWNLOADS: ${{ github.workspace }}/.vcpkg-downloads

jobs:
  linux-release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Create vcpkg cache directories
        run: mkdir -p .vcpkg-bincache .vcpkg-downloads

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .vcpkg-bincache
            .vcpkg-downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get -y install cmake clang ninja-build xorg-dev libglu1-mesa-dev

      - name: Configure
        run: cmake --preset clang-ninja-release

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: |
            .vcpkg-bincache
            .vcpkg-downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build
        run: cmake --build --preset clang-ninja-release --parallel 4

      - name: Run tests
        run: ctest --preset clang-ninja-release

      - name: Install
        run: cmake --build --preset clang-ninja-release --target install

      - name: Prepare Artifact
        run: |
          mkdir Soldank++
          cp bin/* Soldank++
          tar -czvf Soldank++-latest-linux-x64.tar.gz Soldank++

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: Soldank++-latest-linux-x64.tar.gz

  windows-release:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Show Visual Studio installations
        run: |
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -all -products *
          cmake --version
          cmake --list-presets

      - name: Create vcpkg cache directories
        run: New-Item -ItemType Directory -Force .vcpkg-bincache, .vcpkg-downloads

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .vcpkg-bincache
            .vcpkg-downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure
        run: cmake --preset msvc-vs-release

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: |
            .vcpkg-bincache
            .vcpkg-downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build
        run: cmake --build --preset msvc-vs-release --parallel 4

      - name: Run tests
        run: ctest --preset msvc-vs-release

      - name: Prepare Artifact
        run: |
          mkdir Soldank++
          cp build/msvc-vs-release/bin/Release/* Soldank++
          Compress-Archive -Path Soldank++ -Destination Soldank++-latest-win32-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: Soldank++-latest-win32-x64.zip
        
  upload-release:
    runs-on: windows-latest
    needs: [linux-release, windows-release]

    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Upload release
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          if (gh release list | Select-String -Pattern release-latest) {
            echo "Delete release-latest"
            gh release delete release-latest --yes --cleanup-tag
          }
          
          gh release create release-latest `
          windows-release/Soldank++-latest-win32-x64.zip `
          linux-release/Soldank++-latest-linux-x64.tar.gz `
            --target main `
            --title "Soldank++ latest build" `
            --notes "Soldank++ latest build"
          
