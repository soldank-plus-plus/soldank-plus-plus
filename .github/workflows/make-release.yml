name: Make Release

on:
  push:
    branches:
      - main

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
  VCPKG_DOWNLOADS: ${{ github.workspace }}/.vcpkg-downloads
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 1G

jobs:
  linux-release:
    runs-on: ubuntu-26.04

    steps:
      - uses: actions/checkout@v4

      - name: Create cache directories
        run: mkdir -p .vcpkg-bincache .vcpkg-downloads .cpm-cache .ccache

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          ./vcpkg/bootstrap-vcpkg.sh

      - name: Restore vcpkg downloads cache
        id: vcpkg-downloads-cache
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-

      - name: Restore vcpkg binary cache
        id: vcpkg-binary-cache
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-bincache
          key: vcpkg-bincache-${{ runner.os }}-ubuntu26-clang-v1-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-bincache-${{ runner.os }}-ubuntu26-clang-v1-

      - name: Restore compiler cache
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-clang-release-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-clang-release-
            ccache-${{ runner.os }}-clang-

      - name: Restore CPM source cache
        id: cpm-cache
        uses: actions/cache/restore@v4
        with:
          path: .cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get -y install cmake clang ninja-build ccache mold xorg-dev libglu1-mesa-dev
          clang --version
          clang++ --version

      - name: Configure
        run: cmake --preset clang-ninja-release-all

      - name: Save vcpkg downloads cache
        if: steps.vcpkg-downloads-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .vcpkg-downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Save vcpkg binary cache
        if: steps.vcpkg-binary-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .vcpkg-bincache
          key: vcpkg-bincache-${{ runner.os }}-ubuntu26-clang-v1-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Save CPM source cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}

      - name: Build
        run: cmake --build --preset clang-ninja-release-all --parallel

      - name: Show compiler cache stats
        if: always()
        run: ccache --show-stats

      - name: Save compiler cache
        if: always() && steps.ccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-clang-release-${{ github.sha }}

      - name: Run tests
        run: ctest --test-dir build/clang-ninja-release-all --output-on-failure

      - name: Install
        run: cmake --build --preset clang-ninja-release-all --target install --parallel

      - name: Prepare Artifact
        run: |
          mkdir Soldank++
          cp bin/* Soldank++
          tar -czvf Soldank++-latest-linux-x64.tar.gz Soldank++

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: Soldank++-latest-linux-x64.tar.gz

  windows-release:
    runs-on: windows-2022
    env:
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
      SCCACHE_CACHE_SIZE: 1G

    steps:
      - uses: actions/checkout@v4

      - name: Show Visual Studio installations
        run: |
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -all -products *
          cmake --version
          cmake --list-presets

      - name: Create cache directories
        run: New-Item -ItemType Directory -Force .vcpkg-bincache, .vcpkg-downloads, .cpm-cache, .sccache

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Restore vcpkg downloads cache
        id: vcpkg-downloads-cache
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-

      - name: Restore vcpkg binary cache
        id: vcpkg-binary-cache
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-bincache
          key: vcpkg-bincache-${{ runner.os }}-windows2022-msvc-v1-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-bincache-${{ runner.os }}-windows2022-msvc-v1-

      - name: Restore CPM source cache
        id: cpm-cache
        uses: actions/cache/restore@v4
        with:
          path: .cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: Restore compiler cache
        id: sccache-cache
        uses: actions/cache/restore@v4
        with:
          path: .sccache
          key: sccache-${{ runner.os }}-msvc-release-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-msvc-release-
            sccache-${{ runner.os }}-msvc-

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Add LLVM to PATH
        run: |
          $llvmBin = "${env:ProgramFiles}\LLVM\bin"
          if (-not (Test-Path "$llvmBin\lld-link.exe")) {
            choco install llvm -y --no-progress
          }
          Add-Content $env:GITHUB_PATH $llvmBin
          & "$llvmBin\lld-link.exe" --version

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake --preset msvc-ninja-release-all

      - name: Save vcpkg downloads cache
        if: steps.vcpkg-downloads-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .vcpkg-downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Save vcpkg binary cache
        if: steps.vcpkg-binary-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .vcpkg-bincache
          key: vcpkg-bincache-${{ runner.os }}-windows2022-msvc-v1-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Save CPM source cache
        if: steps.cpm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}

      - name: Build
        run: cmake --build --preset msvc-ninja-release-all --parallel

      - name: Show compiler cache stats
        if: always()
        run: sccache --show-stats

      - name: Save compiler cache
        if: always() && steps.sccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .sccache
          key: sccache-${{ runner.os }}-msvc-release-${{ github.sha }}

      - name: Run tests
        run: ctest --preset msvc-ninja-release-all

      - name: Prepare Artifact
        run: |
          mkdir Soldank++
          cp build/msvc-ninja-release-all/bin/* Soldank++
          Compress-Archive -Path Soldank++ -Destination Soldank++-latest-win32-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: Soldank++-latest-win32-x64.zip
        
  upload-release:
    runs-on: windows-latest
    needs: [linux-release, windows-release]

    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Upload release
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }}
        run: |
          if (gh release list | Select-String -Pattern release-latest) {
            echo "Delete release-latest"
            gh release delete release-latest --yes --cleanup-tag
          }
          
          gh release create release-latest `
          windows-release/Soldank++-latest-win32-x64.zip `
          linux-release/Soldank++-latest-linux-x64.tar.gz `
            --target main `
            --title "Soldank++ latest build" `
            --notes "Soldank++ latest build"
          
