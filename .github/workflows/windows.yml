name: Windows Debug Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  windows-debug:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Show Visual Studio installations
        run: |
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -all -products *
          cmake --version
          cmake --list-presets

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Configure
        run: cmake --preset clang-cl-vs-debug

      - name: Build
        run: cmake --build --preset clang-cl-vs-debug --parallel 4

      - name: Run tests
        run: ctest --preset clang-cl-vs-debug
