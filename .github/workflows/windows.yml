name: Windows Debug Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
  VCPKG_DOWNLOADS: ${{ github.workspace }}/.vcpkg-downloads

jobs:
  windows-debug:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Show Visual Studio installations
        run: |
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -all -products *
          cmake --version
          cmake --list-presets

      - name: Create vcpkg cache directories
        run: New-Item -ItemType Directory -Force .vcpkg-bincache, .vcpkg-downloads

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .vcpkg-bincache
            .vcpkg-downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure
        run: cmake --preset msvc-vs-debug

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: |
            .vcpkg-bincache
            .vcpkg-downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Build
        run: cmake --build --preset msvc-vs-debug --parallel

      - name: Run tests
        run: ctest --preset msvc-vs-debug
